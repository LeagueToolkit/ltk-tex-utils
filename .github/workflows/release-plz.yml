name: Release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'LeagueToolkit' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Fetch tags
        run: git fetch --tags --force --prune --unshallow || true
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-release:
    name: Release-plz Release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'LeagueToolkit' }}
    needs: release-plz-pr
    permissions:
      contents: write
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      releases: ${{ steps.release.outputs.releases }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Fetch tags
        run: git fetch --tags --force --prune --unshallow || true
      - name: Run release-plz release
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    name: Build and Upload
    needs: release-plz-release
    if: needs.release-plz-release.outputs.releases_created == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ltk-tex-utils
            asset_name: ltk-tex-utils-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ltk-tex-utils.exe
            asset_name: ltk-tex-utils-windows.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ltk-tex-utils
            asset_name: ltk-tex-utils-macos
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt,clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Extract release tag
        id: release_info
        shell: bash
        run: |
          set -euo pipefail
          RELEASES='${{ needs.release-plz-release.outputs.releases }}'
          TAG=$(echo "$RELEASES" | jq -r '.[] | select(.package_name=="ltk-tex-utils") | .tag')
          if [[ -z "$TAG" || "$TAG" == "null" ]]; then
            echo "No ltk-tex-utils release found in releases output" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Build Release Binary
        run: cargo build --verbose --release --target ${{ matrix.target }}
      - name: Build Windows Thumbnail Handler DLL
        if: matrix.os == 'windows-latest'
        run: cargo build --verbose --release --target ${{ matrix.target }} -p ltk-tex-thumb-handler
      - name: Prepare assets
        shell: bash
        run: |
          set -euo pipefail
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "${{ matrix.asset_name }}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/ltk_tex_thumb_handler.dll" "ltk-tex-thumb-handler.dll"
          fi
      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          files: |
            ${{ matrix.asset_name }}
            ltk-tex-thumb-handler.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
